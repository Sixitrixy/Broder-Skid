[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
  -DCONFIG_ESP_WIFI_ENABLE_WIFI_TX_BUFFER=1
  -DCORE_DEBUG_LEVEL=0
  -DBOARD_HAS_PSRAM
lib_deps =
  bodmer/TFT_eSPI@^2.5.43
  sui77/rc-switch@^2.6.4
  crankyoldgit/IRremoteESP8266@^2.8.6
  h2zero/NimBLE-Arduino@^1.4.1
